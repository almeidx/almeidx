name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: update-readme-cards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # PAT is required to push to the protected main branch
          token: ${{ secrets.PAT }}

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&include_all_commits=true&show_icons=true&theme=dark&icon_color=fff&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner_id }}+${{ github.repository_owner }}@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards [skip ci]" || exit 0
          git push
